apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-apache
  namespace: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-apache
  template:
    metadata:
      labels:
        app: gateway-apache
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: apache
          image: httpd:alpine
          ports:
            - containerPort: 8443
              name: https
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: config-volume
              mountPath: /usr/local/apache2/conf/httpd.conf
              subPath: httpd.conf
      volumes:
        - name: config-volume
          configMap:
            name: apache-gateway-config
