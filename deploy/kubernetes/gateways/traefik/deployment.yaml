apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-traefik
  namespace: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-traefik
  template:
    metadata:
      labels:
        app: gateway-traefik
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      containers:
        - name: traefik
          image: traefik:v3.0
          args:
            - "--providers.file.filename=/etc/traefik/traefik.yaml"
            - "--entrypoints.websecure.address=:8443"
          ports:
            - containerPort: 8443
              name: websecure
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: config-volume
              mountPath: /etc/traefik/traefik.yaml
              subPath: traefik.yaml
      volumes:
        - name: config-volume
          configMap:
            name: traefik-gateway-config
