# Generated by gateway compiler.py

LoadModule ssl_module modules/mod_ssl.so
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so
LoadModule headers_module modules/mod_headers.so

Listen 443

<VirtualHost *:443>
    ServerName api.example.com

    # SSL Configuration
    SSLEngine on
    SSLCertificateFile "/etc/ssl/certs/api.example.com.crt"
    SSLCertificateKeyFile "/etc/ssl/private/api.example.com.key"
    SSLProtocol all -SSLv3 +TLS1.2 +TLS1.3
    SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder on

    # Security Headers
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    Header always set X-Frame-Options "DENY"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Content-Security-Policy "default-src 'self'; frame-ancestors 'none'; object-src 'none';"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"

    # Request Enrichment
    RequestHeader set X-Request-ID expr=%{ENV:UNIQUE_ID}
    RequestHeader set X-Client-IP "$remote_addr"
    RequestHeader set X-Gateway-Received "$time_iso8601"

    ProxyPreserveHost On

    # Routing for /v1/users -> user-service
    ProxyPass "/v1/users" "http://user-service:5678/v1/users"
    ProxyPassReverse "/v1/users" "http://user-service:5678/v1/users"

    # Routing for /v1/products -> product-service
    ProxyPass "/v1/products" "http://product-service:5678/v1/products"
    ProxyPassReverse "/v1/products" "http://product-service:5678/v1/products"

    # Routing for /v1/orders -> order-service
    ProxyPass "/v1/orders" "http://order-service:5678/v1/orders"
    ProxyPassReverse "/v1/orders" "http://order-service:5678/v1/orders"

</VirtualHost>
