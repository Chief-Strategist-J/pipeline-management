      - security-headers
      - request-enrichment
      - ddos-rate-limit
      rule: Host(`api.xyz.com`) && PathPrefix(`/api`)
      service: python-service
      tls: {}
    react-app-react-service-0:
      entryPoints:
      - websecure
      middlewares:
      - security-headers
      - request-enrichment
      - ddos-rate-limit
      rule: Host(`xyz.com`) && PathPrefix(`/`)
      service: react-service
      tls: {}
  services:
    order-service:
      loadBalancer:
        circuitBreaker:
          expression: NetworkErrorRatio() > 0.30 || ResponseCodeRatio(500, 600, 0,
            1) > 0.30
        healthCheck:
          interval: 10s
          path: /healthz
          timeout: 2s
        servers:
        - url: http://order-service:5678
