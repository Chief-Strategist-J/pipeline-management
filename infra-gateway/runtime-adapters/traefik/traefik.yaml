# Generated by gateway compiler.py
http:
  middlewares:
    ddos-rate-limit:
      rateLimit:
        average: 10
        burst: 20
    request-enrichment:
      headers:
        customRequestHeaders:
          X-Client-IP: $remote_addr
          X-Gateway-Received: $time_iso8601
          X-Request-ID: $request_id
    security-headers:
      headers:
        browserXssFilter: true
        contentSecurityPolicy: default-src 'self'; frame-ancestors 'none'; object-src
          'none';
        contentTypeNosniff: true
        forceSTSHeader: true
        frameDeny: true
        permissionsPolicy: geolocation=(), microphone=(), camera=()
        referrerPolicy: strict-origin-when-cross-origin
        sslRedirect: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
  routers:
    example-app-order-service-2:
      entryPoints:
      - websecure
      middlewares:
      - security-headers
      - request-enrichment
      - ddos-rate-limit
      rule: Host(`api.example.com`) && PathPrefix(`/v1/orders`)
      service: order-service
      tls: {}
    example-app-product-service-1:
      entryPoints:
      - websecure
      middlewares:
      - security-headers
      - request-enrichment
      - ddos-rate-limit
      rule: Host(`api.example.com`) && PathPrefix(`/v1/products`)
      service: product-service
      tls: {}
    example-app-user-service-0:
