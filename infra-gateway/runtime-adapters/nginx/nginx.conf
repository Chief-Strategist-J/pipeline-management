# Generated by gateway compiler.py

pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # Speed Optimization: Payload Compression (Gzip)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
    gzip_comp_level 5;

    # Edge DDoS Protection: Rate Limit Zones
    limit_req_zone $binary_remote_addr zone=ip_limit_zone:10m rate=10r/s;

    # Upstreams
upstream user-service_pool {
    zone user-service_backend 64k;
    server user-service:5678 max_fails=3 fail_timeout=2s;
}

upstream product-service_pool {
    zone product-service_backend 64k;
    server product-service:5678 max_fails=3 fail_timeout=2s;
}

upstream order-service_pool {
    zone order-service_backend 64k;
    server order-service:5678 max_fails=3 fail_timeout=2s;
}

upstream react-service_pool {
    zone react-service_backend 64k;
    server 10.244.20.1:3000 max_fails=3 fail_timeout=10s;
}

upstream python-service_pool {
    zone python-service_backend 64k;
    server 10.244.10.1:8000 max_fails=3 fail_timeout=10s;
}

    # Virtual Servers / Virtual Hosts
server {
    listen 443 ssl http2;
    server_name api.example.com;

    # SSL Configuration
    ssl_certificate /etc/ssl/certs/api.example.com.crt;
    ssl_certificate_key /etc/ssl/private/api.example.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    # Speed Optimization: SSL Session Resumption & OCSP Stapling
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets on;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none'; object-src 'none';" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    proxy_set_header X-Request-ID "$request_id";
    proxy_set_header X-Client-IP "$remote_addr";
    proxy_set_header X-Gateway-Received "$time_iso8601";

    location /v1/users {
        proxy_pass http://user-service_pool;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # W3C Distributed Tracing propagation
        proxy_set_header traceparent $http_traceparent;
        proxy_set_header tracestate $http_tracestate;

        # DDoS Mitigation & Rate Limiting
        limit_req zone=ip_limit_zone burst=20 nodelay;
        # Auth required - gateway validation placeholder
        # auth_request /_auth_validate;
    }

    location /v1/products {
        proxy_pass http://product-service_pool;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # W3C Distributed Tracing propagation
        proxy_set_header traceparent $http_traceparent;
        proxy_set_header tracestate $http_tracestate;

        # DDoS Mitigation & Rate Limiting
        limit_req zone=ip_limit_zone burst=20 nodelay;
    }

    location /v1/orders {
        proxy_pass http://order-service_pool;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # W3C Distributed Tracing propagation
        proxy_set_header traceparent $http_traceparent;
        proxy_set_header tracestate $http_tracestate;

        # DDoS Mitigation & Rate Limiting
        limit_req zone=ip_limit_zone burst=20 nodelay;
        # Auth required - gateway validation placeholder
        # auth_request /_auth_validate;
    }

}

